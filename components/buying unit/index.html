<!DOCTYPE html>
<html lang="en" data-brand="wilko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buying Unit — CDS Configurator</title>
  <link rel="stylesheet" href="https://use.typekit.net/nsp1wdf.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primitive-white:#ffffff;--primitive-grey-1:#f4f4f4;--primitive-grey-2:#e6e6e6;--primitive-grey-3:#d9d9d9;--primitive-grey-4:#cccccc;--primitive-grey-5:#888888;--primitive-grey-6:#666666;
      --font-size-massive:40px;--font-size-xxl:32px;--font-size-xl:28px;--font-size-l:24px;--font-size-m:20px;--font-size-s:16px;--font-size-xs:14px;--font-size-xxs:12px;--font-size-tiny:10px;
      --radius-xs:4px;--radius-s:8px;--radius-m:12px;--radius-l:16px;--radius-xl:24px;--radius-full:100px;
      --stroke-thin:1px;--stroke-normal:1.5px;--stroke-thick:2px;
      --space-l:48px;--space-m:32px;--space-s:24px;--space-xs:16px;--space-12:12px;--space-8:8px;--space-4:4px;
      --motion-duration-base:250ms;--motion-ease-standard:cubic-bezier(0.4,0,0.2,1);
    }
    [data-brand="wilko"]{--color-brand-primary:#9d2235;--color-brand-ratings:#f68d00;--color-brand-sale:#e41222;--color-btn-primary-bg:#23854a;--color-btn-primary-bg-hover:#175e40;--color-btn-primary-label:#ffffff;--color-btn-radius:100px;--font-family:sofia-pro,sans-serif;--font-feature-settings:"ss04" 1;--font-weight-bold:700;--font-weight-semibold:600;--font-weight-medium:500;--font-weight-regular:400;--color-surface-page:#ffffff;--color-surface-subtle:#f4f4f4;--color-text-primary:#222222;--color-text-secondary:#666666;--color-text-disabled:#888888;--color-border-default:#e6e6e6;--color-border-strong:#cccccc;--color-border-input:#888888;--color-focus-ring:#024960;--color-neutral-grey-3:#d9d9d9;--color-neutral-grey-5:#888888;--color-neutral-grey-7:#222222;--color-success-text:#175e40;--color-warning-text:#652e26;--color-error-text:#6f1827;}
    [data-brand="homebase"]{--color-brand-primary:#1d8634;--color-brand-ratings:#fb610b;--color-brand-sale:#ee0000;--color-btn-primary-bg:#1d8634;--color-btn-primary-bg-hover:#155d25;--color-btn-primary-label:#ffffff;--color-btn-radius:100px;--font-family:'Rubik',sans-serif;--font-feature-settings:normal;--font-weight-bold:600;--font-weight-semibold:600;--font-weight-medium:400;--font-weight-regular:400;--color-surface-page:#ffffff;--color-surface-subtle:#f4f4f4;--color-text-primary:#333333;--color-text-secondary:#666666;--color-text-disabled:#888888;--color-border-default:#e6e6e6;--color-border-strong:#cccccc;--color-border-input:#888888;--color-focus-ring:#2b347f;--color-neutral-grey-3:#d9d9d9;--color-neutral-grey-5:#888888;--color-neutral-grey-7:#333333;--color-success-text:#155d25;--color-warning-text:#652e26;--color-error-text:#810808;}
    [data-brand]{font-family:var(--font-family);font-feature-settings:var(--font-feature-settings);color:var(--color-text-primary);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
    *{box-sizing:border-box;margin:0;padding:0;}
    [data-brand] button,[data-brand] input,[data-brand] select,[data-brand] label{font-family:var(--font-family);font-feature-settings:var(--font-feature-settings);-webkit-font-smoothing:antialiased;}
    body{font-family:var(--font-family);font-feature-settings:var(--font-feature-settings);-webkit-font-smoothing:antialiased;background:var(--color-surface-page);min-height:100vh;padding:var(--space-m);}
    .page-header{margin-bottom:var(--space-s);padding-bottom:var(--space-xs);border-bottom:var(--stroke-thin) solid var(--color-border-default);display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:var(--space-8);}
    .page-header h1{font-size:var(--font-size-m);font-weight:var(--font-weight-bold);}
    .page-header p{font-size:var(--font-size-xs);color:var(--color-text-secondary);}
    .brand-switcher{display:flex;gap:var(--space-4);background:var(--color-surface-subtle);border-radius:var(--radius-full);padding:3px;}
    .brand-btn{padding:5px 14px;border-radius:var(--radius-full);border:none;background:transparent;font-family:var(--font-family);font-size:var(--font-size-xxs);font-weight:var(--font-weight-medium);color:var(--color-text-secondary);cursor:pointer;transition:all var(--motion-duration-base) var(--motion-ease-standard);}
    .brand-btn.active{background:var(--color-brand-primary);color:#ffffff;font-weight:var(--font-weight-bold);}
    .layout{display:grid;grid-template-columns:1fr 320px;gap:var(--space-s);align-items:start;}
    @media(max-width:900px){.layout{grid-template-columns:1fr;}}
    .preview-canvas{background:var(--color-surface-subtle);border-radius:var(--radius-l);min-height:520px;display:flex;align-items:center;justify-content:center;padding:var(--space-l);position:relative;}
    .preview-label{position:absolute;bottom:var(--space-xs);left:0;right:0;text-align:center;font-size:var(--font-size-xxs);color:var(--color-text-secondary);font-weight:var(--font-weight-medium);text-transform:uppercase;letter-spacing:.08em;pointer-events:none;}

    /* ── CDS BUYING UNIT ─────────────────────────────────────── */
    .cds-buying-unit{width:380px;background:var(--color-surface-page);border:var(--stroke-thin) solid var(--color-border-default);border-radius:var(--radius-s);overflow:hidden;}
    .bu-section{padding:var(--space-xs);display:flex;flex-direction:column;gap:var(--space-12);}
    .bu-section+.bu-section{border-top:var(--stroke-thin) solid var(--color-border-default);}
    .bu-header-row{display:flex;align-items:center;justify-content:space-between;gap:var(--space-8);}
    .bu-header-left{display:flex;align-items:center;gap:var(--space-8);font-size:var(--font-size-s);font-weight:var(--font-weight-bold);color:var(--color-text-primary);}
    .bu-header-left svg{width:20px;height:20px;flex-shrink:0;}
    .bu-header-right{display:flex;align-items:center;gap:6px;font-size:var(--font-size-xs);font-weight:var(--font-weight-medium);white-space:nowrap;}
    .bu-stock-indicator{width:16px;height:16px;flex-shrink:0;}
    .bu-stock-indicator svg{width:16px;height:16px;display:block;}
    .bu-stock-text{color:var(--color-neutral-grey-7);}
    .bu-stock-text.green,.bu-stock-text.amber,.bu-stock-text.red,.bu-stock-text.preorder{color:var(--color-neutral-grey-7);}
    .bu-stock-text.unavailable{color:var(--color-neutral-grey-6,#666666);}
    .bu-store-row{display:flex;align-items:center;justify-content:space-between;gap:var(--space-8);font-size:var(--font-size-xs);color:var(--color-text-secondary);}
    .bu-store-name{color:var(--color-text-primary);font-weight:var(--font-weight-regular);}
    .bu-store-action{display:flex;align-items:center;gap:4px;white-space:nowrap;}
    .bu-store-action svg{width:16px;height:16px;flex-shrink:0;color:var(--color-btn-primary-bg);}
    .bu-store-link{color:var(--color-btn-primary-bg);font-weight:var(--font-weight-bold);text-decoration:underline;cursor:pointer;font-size:var(--font-size-xs);}
    .bu-cta{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;height:52px;border-radius:var(--color-btn-radius,var(--radius-full));font-family:var(--font-family);font-feature-settings:var(--font-feature-settings);font-weight:var(--font-weight-bold);font-size:var(--font-size-s);cursor:pointer;transition:all var(--motion-duration-base) var(--motion-ease-standard);white-space:nowrap;-webkit-font-smoothing:antialiased;outline:none;border:none;}
    .bu-cta.primary{background-color:var(--color-btn-primary-bg);color:var(--color-btn-primary-label);}
    .bu-cta.primary:hover{background-color:var(--color-btn-primary-bg-hover);}
    .bu-cta.outlined{background:var(--color-surface-page);color:var(--color-btn-primary-bg);border:var(--stroke-thick) solid var(--color-btn-primary-bg);}
    .bu-cta.outlined:hover{background:var(--color-btn-primary-bg);color:var(--color-btn-primary-label);}
    .bu-cta.disabled{background-color:var(--color-neutral-grey-3);color:var(--color-neutral-grey-5);cursor:not-allowed;}
    .bu-cta:not(.disabled):focus-visible{outline:var(--stroke-thick) solid var(--color-focus-ring);outline-offset:2px;}
    [data-brand="wilko"] .bu-cta .cta-label-text{transform:translateY(-2px);}
    .bu-uvp-row{display:flex;align-items:center;gap:var(--space-8);font-size:var(--font-size-xs);color:var(--color-text-primary);font-weight:var(--font-weight-regular);}
    .bu-uvp-icon{width:20px;height:20px;flex-shrink:0;}
    .bu-uvp-icon svg{width:20px;height:20px;display:block;}
    .bu-info-row{display:flex;align-items:center;gap:var(--space-8);font-size:var(--font-size-xs);color:var(--color-text-primary);font-weight:var(--font-weight-medium);}
    .bu-info-row svg{width:20px;height:20px;flex-shrink:0;color:var(--color-text-secondary);}
    .bu-info-block{font-size:var(--font-size-xs);color:var(--color-text-secondary);line-height:1.5;}
    .bu-store-action.grey svg{color:var(--color-neutral-grey-7);}
    .bu-store-action.grey .bu-store-link{color:var(--color-neutral-grey-7);}
    .bu-preorder-delivery{display:flex;align-items:flex-start;gap:var(--space-8);font-size:var(--font-size-xs);color:var(--color-text-primary);}
    .bu-preorder-delivery svg{width:16px;height:16px;flex-shrink:0;margin-top:1px;color:var(--color-text-secondary);}
    .bu-preorder-delivery strong{font-weight:var(--font-weight-bold);}
    [data-brand="wilko"] .bu-info-row span,
    [data-brand="wilko"] .bu-uvp-row span,
    [data-brand="wilko"] .bu-store-name,
    [data-brand="wilko"] .bu-store-link,
    [data-brand="wilko"] .bu-stock-text,
    [data-brand="wilko"] .bu-header-left span,
    [data-brand="wilko"] .bu-preorder-delivery span{line-height:1;transform:translateY(-1px);display:inline-block;}

    /* ── CONFIGURATOR ────────────────────────────────────────── */
    .configurator{background:var(--color-surface-page);border:var(--stroke-thin) solid var(--color-border-default);border-radius:var(--radius-l);overflow:hidden;}
    .config-section{padding:var(--space-xs);border-bottom:var(--stroke-thin) solid var(--color-border-default);}
    .config-section:last-child{border-bottom:none;}
    .config-section-title{font-size:var(--font-size-xxs);font-weight:var(--font-weight-bold);color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.08em;margin-bottom:var(--space-8);}
    .config-dropdown{position:relative;}
    .config-dropdown-trigger{width:100%;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:var(--radius-s);border:var(--stroke-normal) solid var(--color-border-strong);background:var(--color-surface-page);font-family:var(--font-family);font-feature-settings:var(--font-feature-settings);font-size:var(--font-size-xs);color:var(--color-text-primary);cursor:pointer;text-align:left;transition:border-color var(--motion-duration-base) var(--motion-ease-standard);}
    .config-dropdown-trigger:focus{outline:none;border-color:var(--color-focus-ring);}
    .config-dropdown-trigger .trigger-caret{width:14px;height:14px;flex-shrink:0;color:var(--color-text-secondary);transition:transform var(--motion-duration-base) var(--motion-ease-standard);}
    .config-dropdown.open .trigger-caret{transform:rotate(180deg);}
    .config-dropdown.open .config-dropdown-trigger{border-color:var(--color-focus-ring);}
    .config-dropdown-panel{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:100;background:var(--color-surface-page);border:var(--stroke-normal) solid var(--color-border-strong);border-radius:var(--radius-s);box-shadow:0 4px 12px rgba(0,0,0,.1);max-height:260px;overflow-y:auto;}
    .config-dropdown.open .config-dropdown-panel{display:block;}
    .config-dropdown-option{display:flex;align-items:center;padding:8px 12px;cursor:pointer;font-family:var(--font-family);font-feature-settings:var(--font-feature-settings);font-size:var(--font-size-xs);color:var(--color-text-primary);border:none;background:transparent;width:100%;text-align:left;transition:background var(--motion-duration-base) var(--motion-ease-standard);}
    .config-dropdown-option:hover{background:var(--color-surface-subtle);}
    .config-dropdown-option.selected{background:var(--color-surface-subtle);font-weight:var(--font-weight-bold);}
    .config-dropdown-option+.config-dropdown-option{border-top:var(--stroke-thin) solid var(--color-border-default);}
    .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;}
    .toggle-row+.toggle-row{border-top:var(--stroke-thin) solid var(--color-border-default);}
    .toggle-label{font-size:var(--font-size-xs);color:var(--color-text-primary);}
    .toggle-switch{position:relative;width:40px;height:22px;flex-shrink:0;}
    .toggle-switch input{opacity:0;width:0;height:0;}
    .toggle-track{position:absolute;inset:0;border-radius:11px;background:var(--color-neutral-grey-3);cursor:pointer;transition:background var(--motion-duration-base) var(--motion-ease-standard);}
    .toggle-track::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform var(--motion-duration-base) var(--motion-ease-standard);}
    .toggle-switch input:checked+.toggle-track{background:var(--color-btn-primary-bg);}
    .toggle-switch input:checked+.toggle-track::after{transform:translateX(18px);}
    .token-readout{background:var(--color-surface-subtle);border-radius:var(--radius-s);padding:var(--space-8) var(--space-12);font-size:11px;color:var(--color-text-secondary);font-family:'Courier New',monospace;}
    .token-row{display:flex;justify-content:space-between;gap:8px;padding:2px 0;}
    .token-name{color:var(--color-text-secondary);}.token-value{color:var(--color-brand-primary);font-weight:600;}
    .snippet-panel{margin-top:var(--space-s);border:var(--stroke-thin) solid var(--color-border-default);border-radius:var(--radius-l);overflow:hidden;}
    .snippet-header{display:flex;align-items:center;justify-content:space-between;padding:0 var(--space-xs);border-bottom:var(--stroke-thin) solid var(--color-border-default);background:var(--color-surface-subtle);}
    .snippet-tabs{display:flex;}
    .snippet-tab{padding:10px 14px;border:none;background:transparent;font-family:var(--font-family);font-feature-settings:var(--font-feature-settings);font-size:var(--font-size-xxs);font-weight:var(--font-weight-bold);color:var(--color-text-secondary);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all var(--motion-duration-base) var(--motion-ease-standard);text-transform:uppercase;letter-spacing:.06em;}
    .snippet-tab:hover{color:var(--color-text-primary);}
    .snippet-tab.active{color:var(--color-btn-primary-bg);border-bottom-color:var(--color-btn-primary-bg);}
    .snippet-copy-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--radius-full);border:var(--stroke-normal) solid var(--color-border-strong);background:var(--color-surface-page);font-family:var(--font-family);font-feature-settings:var(--font-feature-settings);font-size:var(--font-size-xxs);font-weight:var(--font-weight-bold);color:var(--color-text-primary);cursor:pointer;transition:all var(--motion-duration-base) var(--motion-ease-standard);white-space:nowrap;}
    .snippet-copy-btn:hover{border-color:var(--color-btn-primary-bg);color:var(--color-btn-primary-bg);}
    .snippet-copy-btn.copied{background:var(--color-btn-primary-bg);border-color:var(--color-btn-primary-bg);color:#fff;}
    .snippet-copy-btn svg{width:12px;height:12px;flex-shrink:0;}
    .snippet-body{padding:var(--space-xs);background:var(--color-surface-page);overflow-x:auto;}
    .snippet-pre{margin:0;font-family:'Courier New','Menlo',monospace;font-size:12px;line-height:1.65;color:var(--color-text-primary);white-space:pre;tab-size:2;}
    .snip-comment{color:var(--color-text-secondary);}.snip-tag{color:var(--color-brand-primary);font-weight:600;}.snip-attr{color:#6066b0;}.snip-string{color:#2a7a4f;}.snip-class{color:var(--color-btn-primary-bg);}.snip-sel{color:var(--color-brand-primary);font-weight:600;}.snip-prop{color:#6066b0;}.snip-val{color:#2a7a4f;}.snip-tok{color:#b07c2a;}
  </style>
</head>
<body>
  <div class="page-header"><div><h1>Buying Unit</h1><p style="margin-top:3px;">Nest Design System • v1.0</p></div><div class="brand-switcher"><button class="brand-btn active" id="btn-wilko" onclick="setBrand('wilko')">wilko.com</button><button class="brand-btn" id="btn-homebase" onclick="setBrand('homebase')">homebase.co.uk</button></div></div>
  <div class="layout">
    <div class="preview-canvas"><div id="bu-preview"></div><p class="preview-label" id="preview-caption"></p></div>
    <div class="configurator">
      <div class="config-section"><div class="config-section-title">Delivery state</div><div class="config-dropdown" id="del-dropdown"><button class="config-dropdown-trigger" onclick="toggleDD('del')" type="button"><span id="del-trigger-name">In Stock</span><svg class="trigger-caret" viewBox="0 0 20 20"><path d="M15 7.5L10 12.5L5 7.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></button><div class="config-dropdown-panel" id="del-panel"></div></div></div>
      <div class="config-section"><div class="config-section-title" id="cc-section-title">Click & Collect state</div><div class="config-dropdown" id="cc-dropdown"><button class="config-dropdown-trigger" onclick="toggleDD('cc')" type="button"><span id="cc-trigger-name">Location not selected</span><svg class="trigger-caret" viewBox="0 0 20 20"><path d="M15 7.5L10 12.5L5 7.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></button><div class="config-dropdown-panel" id="cc-panel"></div></div></div>
      <div class="config-section"><div class="config-section-title">Options</div><div class="toggle-row"><span class="toggle-label">Store stock only</span><label class="toggle-switch"><input type="checkbox" id="toggle-store-only" onchange="updateAll()"><span class="toggle-track"></span></label></div><div class="toggle-row"><span class="toggle-label">Show UVPs</span><label class="toggle-switch"><input type="checkbox" id="toggle-uvps" checked onchange="updateAll()"><span class="toggle-track"></span></label></div></div>
      <div class="config-section"><div class="config-section-title">Active tokens</div><div class="token-readout" id="token-readout"></div></div>
    </div>
  </div>
  <div class="snippet-panel"><div class="snippet-header"><div class="snippet-tabs"><button class="snippet-tab active" id="tab-html" onclick="setSnippetTab('html')">HTML</button><button class="snippet-tab" id="tab-css" onclick="setSnippetTab('css')">CSS</button></div><button class="snippet-copy-btn" id="copy-btn" onclick="copySnippet()"><svg id="copy-icon" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="8" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M3 11V3.5A1.5 1.5 0 0 1 4.5 2H10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><span id="copy-label">Copy</span></button></div><div class="snippet-body"><pre class="snippet-pre" id="snippet-output"></pre></div></div>

  <script>
    var brand='wilko',delState='in-stock',ccState='location-not-set',snippetTab='html';
    var delStates=[{key:'in-stock',label:'In Stock'},{key:'low-stock',label:'Low Stock'},{key:'out-of-stock',label:'Out of Stock'},{key:'pre-order',label:'Pre-order'},{key:'unavailable',label:'Unavailable'}];
    var ccStates=[{key:'location-not-set',label:'Location not selected'},{key:'in-stock',label:'In Stock'},{key:'low-stock',label:'Low Stock'},{key:'out-of-stock',label:'Out of Stock'},{key:'not-eligible',label:'Not Eligible (DSV)'},{key:'unavailable',label:'Unavailable'}];

    function svg20(k){return '<svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">'+svgIcons[k]+'</svg>';}
    function fulfilIcon(t){return svg20(t+'-'+brand);}
    function stockSvg(c){return svg20('stock-'+c);}
    function uvpSvg(){return svg20('uvpTick');}
    function stockProps(s){if(s==='in-stock')return{cls:'green',text:'20+ in stock'};if(s==='low-stock')return{cls:'amber',text:'Hurry, 4 left!'};if(s==='out-of-stock')return{cls:'red',text:'Out of stock'};if(s==='pre-order')return{cls:'preorder',text:'Pre-order'};if(s==='unavailable'||s==='not-eligible')return{cls:'unavailable',text:'Unavailable'};return null;}
    function renderStockBadge(sp){return '<span class="bu-stock-indicator">'+stockSvg(sp.cls)+'</span><span class="bu-stock-text '+sp.cls+'">'+sp.text+'</span>';}

    function renderPreview(){
      var so=document.getElementById('toggle-store-only').checked,uv=document.getElementById('toggle-uvps').checked;
      var h='<div class="cds-buying-unit">';
      // DELIVERY
      h+='<div class="bu-section">';
      var dsp=stockProps(delState);
      h+='<div class="bu-header-row"><div class="bu-header-left">'+fulfilIcon('van')+'<span>Delivery</span></div>';
      if(dsp)h+='<div class="bu-header-right">'+renderStockBadge(dsp)+'</div>';
      h+='</div>';
      if(delState==='in-stock'||delState==='low-stock')h+='<button class="bu-cta primary"><span class="cta-label-text">Add for delivery</span></button>';
      else if(delState==='out-of-stock')h+='<button class="bu-cta outlined"><span class="cta-label-text">Email when in stock</span></button>';
      else if(delState==='pre-order'){h+='<button class="bu-cta primary"><span class="cta-label-text">Pre-order now</span></button>';h+='<div class="bu-preorder-delivery"><svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">'+svgIcons.date+'</svg><span>Estimated delivery: 19th Apr &ndash; <strong>26th Apr</strong></span></div>';h+='<div class="bu-info-row"><svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">'+svgIcons.info+'</svg><span>How Pre-order works</span></div>';}
      else if(delState==='unavailable')h+='';
      h+='</div>';
      // C&C / CHECK STORE
      h+='<div class="bu-section">';
      if(so){
        h+='<div class="bu-header-row"><div class="bu-header-left">'+fulfilIcon('store')+'<span>Check store stock</span></div>';
        if(ccState==='location-not-set'){h+='<div class="bu-header-right"><div class="bu-store-action grey"><span class="bu-store-link">Find a store</span></div></div>';}
        else{var csp=stockProps(ccState);if(csp)h+='<div class="bu-header-right">'+renderStockBadge(csp)+'</div>';}
        h+='</div>';
        if(ccState==='in-stock'||ccState==='low-stock'||ccState==='out-of-stock'){
          h+='<div class="bu-store-row"><span class="bu-store-name">Plymouth, Armada Way</span><div class="bu-store-action grey"><span class="bu-store-link">Change store</span></div></div>';
        }
      }else{
        h+='<div class="bu-header-row"><div class="bu-header-left">'+fulfilIcon('store')+'<span>Click &amp; Collect</span></div>';
        if(ccState==='location-not-set'){
          h+='<div class="bu-header-right"><div class="bu-store-action grey"><span class="bu-store-link">Find a store</span></div></div>';
        }else{var csp2=stockProps(ccState);if(csp2)h+='<div class="bu-header-right">'+renderStockBadge(csp2)+'</div>';}
        h+='</div>';
        if(ccState!=='location-not-set'&&ccState!=='not-eligible'&&ccState!=='unavailable'){
          h+='<div class="bu-store-row"><span class="bu-store-name">Plymouth, Armada Way</span><div class="bu-store-action grey"><span class="bu-store-link">Change store</span></div></div>';
        }
        if(ccState==='location-not-set'||ccState==='in-stock'||ccState==='low-stock')h+='<button class="bu-cta primary"><span class="cta-label-text">Add for collection</span></button>';
        else if(ccState==='out-of-stock')h+='<button class="bu-cta outlined"><span class="cta-label-text">Try a different store</span></button>';
        else if(ccState==='not-eligible')h+='<div class="bu-info-block">Online exclusive items are only available for home delivery.</div>';
        if(uv&&ccState==='location-not-set'){
          ['Collect in as little as 1 hour','220+ collection points nationwide','Free collection, no minimum spend'].forEach(function(u){
            h+='<div class="bu-uvp-row"><span class="bu-uvp-icon">'+uvpSvg()+'</span><span>'+u+'</span></div>';
          });
        }
        if(ccState!=='not-eligible'&&ccState!=='unavailable')h+='<div class="bu-info-row"><svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">'+svgIcons.info+'</svg><span>How Click &amp; Collect works</span></div>';
      }
      h+='</div></div>';
      document.getElementById('bu-preview').innerHTML=h;
      var dL='';delStates.forEach(function(o){if(o.key===delState)dL=o.label;});
      var cL='',ccList=so?checkStoreStates:ccStates;ccList.forEach(function(o){if(o.key===ccState)cL=o.label;});
      document.getElementById('preview-caption').textContent='Delivery: '+dL+' · '+(so?'Check Store':'C&C')+': '+cL;
    }

    function updateTokenReadout(){
      var t={};t['--font-family']=brand==='wilko'?'sofia-pro':'Rubik';t['--color-btn-primary-bg']=brand==='wilko'?'#23854a':'#1d8634';t['--color-btn-radius']='100px';t['--color-border-default']='#e6e6e6';t['--space-xs (padding)']='16px';
      var h='';Object.keys(t).forEach(function(k){h+='<div class="token-row"><span class="token-name">'+k+'</span><span class="token-value">'+t[k]+'</span></div>';});
      document.getElementById('token-readout').innerHTML=h;
    }

    function generateSnippet(){
      var el=document.getElementById('snippet-output');var c='<span class="snip-comment">',cc='</span>';
      if(snippetTab==='css'){var sel='<span class="snip-sel">',selc='</span>',p='<span class="snip-prop">',pc='</span>',v='<span class="snip-val">',vc='</span>',tok='<span class="snip-tok">',tokc='</span>';var o='';o+=c+'/* CDS Buying Unit · '+brand+' */'+cc+'\n\n';o+=sel+'.cds-buying-unit'+selc+' {\n  '+p+'width'+pc+': '+v+'380px'+vc+';\n  '+p+'background'+pc+': '+tok+'var(--color-surface-page)'+tokc+';\n  '+p+'border'+pc+': '+v+'1px solid '+vc+tok+'var(--color-border-default)'+tokc+';\n  '+p+'border-radius'+pc+': '+tok+'var(--radius-s)'+tokc+'; '+c+'/* 8px */'+cc+'\n  '+p+'overflow'+pc+': '+v+'hidden'+vc+';\n}\n\n';o+=sel+'.bu-section'+selc+' {\n  '+p+'padding'+pc+': '+tok+'var(--space-xs)'+tokc+'; '+c+'/* 16px */'+cc+'\n  '+p+'display'+pc+': '+v+'flex'+vc+';\n  '+p+'flex-direction'+pc+': '+v+'column'+vc+';\n  '+p+'gap'+pc+': '+tok+'var(--space-12)'+tokc+'; '+c+'/* 12px */'+cc+'\n}\n\n';o+=sel+'.bu-section + .bu-section'+selc+' {\n  '+p+'border-top'+pc+': '+v+'1px solid '+vc+tok+'var(--color-border-default)'+tokc+';\n}\n\n';o+=sel+'.bu-cta.primary'+selc+' {\n  '+p+'background-color'+pc+': '+tok+'var(--color-btn-primary-bg)'+tokc+';\n  '+p+'color'+pc+': '+tok+'var(--color-btn-primary-label)'+tokc+';\n  '+p+'border-radius'+pc+': '+tok+'var(--color-btn-radius)'+tokc+'; '+c+'/* 100px */'+cc+'\n  '+p+'height'+pc+': '+v+'52px'+vc+';\n}\n';el.innerHTML=o;}
      else{var t='<span class="snip-tag">',tc='</span>',a='<span class="snip-attr">',ac='</span>',s='<span class="snip-string">',sc='</span>',cl='<span class="snip-class">',clc='</span>';var o='';o+=c+'&lt;!-- CDS Buying Unit · '+brand+' --&gt;'+cc+'\n\n';o+=t+'&lt;div'+tc+' '+a+'class'+ac+'='+s+'"'+cl+'cds-buying-unit'+clc+'"'+sc+t+'&gt;'+tc+'\n\n';o+='  '+c+'&lt;!-- Delivery section --&gt;'+cc+'\n  '+t+'&lt;div'+tc+' '+a+'class'+ac+'='+s+'"bu-section"'+sc+t+'&gt;'+tc+'\n    '+t+'&lt;div'+tc+' '+a+'class'+ac+'='+s+'"bu-header-row"'+sc+t+'&gt;'+tc+'...'+t+'&lt;/div&gt;'+tc+'\n    '+t+'&lt;button'+tc+' '+a+'class'+ac+'='+s+'"'+cl+'bu-cta primary'+clc+'"'+sc+t+'&gt;'+tc+'Add for delivery'+t+'&lt;/button&gt;'+tc+'\n  '+t+'&lt;/div&gt;'+tc+'\n\n';o+='  '+c+'&lt;!-- Click &amp; Collect section --&gt;'+cc+'\n  '+t+'&lt;div'+tc+' '+a+'class'+ac+'='+s+'"bu-section"'+sc+t+'&gt;'+tc+'\n    '+t+'&lt;div'+tc+' '+a+'class'+ac+'='+s+'"bu-header-row"'+sc+t+'&gt;'+tc+'...'+t+'&lt;/div&gt;'+tc+'\n    '+t+'&lt;button'+tc+' '+a+'class'+ac+'='+s+'"'+cl+'bu-cta primary'+clc+'"'+sc+t+'&gt;'+tc+'Add for collection'+t+'&lt;/button&gt;'+tc+'\n    '+c+'&lt;!-- UVP rows + info link --&gt;'+cc+'\n  '+t+'&lt;/div&gt;'+tc+'\n\n'+t+'&lt;/div&gt;'+tc;el.innerHTML=o;}
    }

    function copySnippet(){var el=document.getElementById('snippet-output');navigator.clipboard.writeText(el.textContent||el.innerText).then(function(){var b=document.getElementById('copy-btn'),l=document.getElementById('copy-label');b.classList.add('copied');l.textContent='Copied!';document.getElementById('copy-icon').innerHTML='<path d="M2.5 8L6 11.5L13.5 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>';setTimeout(function(){b.classList.remove('copied');l.textContent='Copy';document.getElementById('copy-icon').innerHTML='<rect x="5" y="5" width="8" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M3 11V3.5A1.5 1.5 0 0 1 4.5 2H10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>';},2000);});}

    function setBrand(b){brand=b;document.documentElement.setAttribute('data-brand',b);document.getElementById('btn-wilko').classList.toggle('active',b==='wilko');document.getElementById('btn-homebase').classList.toggle('active',b==='homebase');updateAll();}
    function setSnippetTab(tab){snippetTab=tab;document.getElementById('tab-html').classList.toggle('active',tab==='html');document.getElementById('tab-css').classList.toggle('active',tab==='css');generateSnippet();}
    function toggleDD(id){var dd=document.getElementById(id+'-dropdown'),other=id==='del'?'cc':'del';document.getElementById(other+'-dropdown').classList.remove('open');dd.classList.toggle('open');if(dd.classList.contains('open'))buildPanel(id);}
    function buildPanel(id){var so=document.getElementById('toggle-store-only').checked,panel=document.getElementById(id+'-panel'),opts=id==='del'?delStates:(so?checkStoreStates:ccStates),cur=id==='del'?delState:ccState,h='';opts.forEach(function(o){h+='<button class="config-dropdown-option'+(o.key===cur?' selected':'')+'" onclick="selectState(\''+id+"','"+o.key+"')\">"+o.label+'</button>';});panel.innerHTML=h;}
    function selectState(id,key){if(id==='del')delState=key;else ccState=key;document.getElementById(id+'-dropdown').classList.remove('open');updateTriggerLabel(id);updateAll();}
    function updateTriggerLabel(id){var so=document.getElementById('toggle-store-only').checked,opts=id==='del'?delStates:(so?checkStoreStates:ccStates),cur=id==='del'?delState:ccState,label='';opts.forEach(function(o){if(o.key===cur)label=o.label;});if(!label){label=opts[0].label;if(id==='del')delState=opts[0].key;else ccState=opts[0].key;}document.getElementById(id+'-trigger-name').textContent=label;}
    document.addEventListener('click',function(e){['del','cc'].forEach(function(id){var dd=document.getElementById(id+'-dropdown');if(dd&&!dd.contains(e.target))dd.classList.remove('open');});});
    function updateAll(){var so=document.getElementById('toggle-store-only').checked;document.getElementById('cc-section-title').textContent=so?'Check store stock state':'Click & Collect state';var ccList=so?checkStoreStates:ccStates,valid=false;ccList.forEach(function(o){if(o.key===ccState)valid=true;});if(!valid)ccState=ccList[0].key;updateTriggerLabel('del');updateTriggerLabel('cc');renderPreview();updateTokenReadout();generateSnippet();}
    updateAll();
  </script>
